<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portrait System Test v3</title>
<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }
	body {
		font-family: -apple-system, BlinkMacSystemFont, sans-serif;
		background: #1a1a2e; color: #e0e0e0; padding: 20px;
	}
	h1 { text-align: center; margin-bottom: 8px; font-size: 1.4em; }
	h2 { font-size: 1.1em; margin-bottom: 10px; }
	.subtitle { text-align: center; color: #888; font-size: 0.85em; margin-bottom: 16px; }
	.controls {
		display: flex; gap: 10px; justify-content: center;
		flex-wrap: wrap; margin-bottom: 16px; align-items: flex-end;
	}
	.controls button, .controls select, .controls input[type="text"],
	.controls input[type="number"] {
		background: #16213e; color: #e0e0e0; border: 1px solid #444;
		padding: 8px 12px; border-radius: 4px; font-size: 0.85em;
	}
	.controls button { cursor: pointer; }
	.controls button:hover { background: #1a1a4e; }
	.controls input[type="text"] { width: 160px; }
	.controls input[type="number"] { width: 70px; }
	.controls select { width: 120px; }
	.controls label {
		font-size: 0.75em; color: #888; display: flex;
		flex-direction: column; gap: 4px; align-items: center;
	}
	.grid {
		display: grid;
		grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
		gap: 12px; max-width: 900px; margin: 0 auto 20px;
	}
	.portrait-card {
		background: #16213e; border-radius: 8px; padding: 10px;
		text-align: center;
	}
	.portrait-card svg { width: 110px; height: 110px; }
	.portrait-card .label {
		font-size: 0.65em; color: #888; margin-top: 4px;
		word-break: break-all; line-height: 1.3;
	}
	.section {
		max-width: 900px; margin: 0 auto 20px; padding: 16px;
		background: #16213e; border-radius: 8px;
	}
	.comparison-row {
		display: flex; gap: 12px; justify-content: center;
		flex-wrap: wrap;
	}
	.comparison-row .portrait-card { background: #1a1a2e; min-width: 100px; }
	hr { border: none; border-top: 1px solid #333; margin: 16px 0; }
</style>
</head>
<body>

<h1>SVG Portrait System v3</h1>
<p class="subtitle">Two-seed identity/variation streams, compatible expression subpools, aggressive age filtering</p>

<!-- Main controls -->
<div class="controls">
	<label>
		Archetype
		<select id="sel-archetype">
			<option value="player" selected>Player</option>
			<option value="rival">Rival</option>
			<option value="coach">Coach</option>
			<option value="recruiter">Recruiter</option>
			<option value="scout">Scout</option>
			<option value="generic">Generic</option>
		</select>
	</label>
	<label>
		Age
		<input type="number" id="inp-age" value="22" min="14" max="70">
	</label>
	<button id="btn-randomize">Randomize Grid</button>
</div>

<!-- Main portrait grid -->
<div class="grid" id="grid"></div>

<hr>

<!-- Seed repeatability test -->
<div class="section">
	<h2>Seed repeatability</h2>
	<div class="controls">
		<label>
			Seed
			<input type="text" id="seed-input" placeholder="Enter a seed string" value="test_player">
		</label>
		<button id="btn-seed">Test</button>
	</div>
	<div class="comparison-row" id="seed-row"></div>
</div>

<!-- Archetype comparison -->
<div class="section">
	<h2>Same person, all archetypes</h2>
	<div class="controls">
		<label>
			Seed
			<input type="text" id="archetype-seed" value="test_character">
		</label>
		<label>
			Age
			<input type="number" id="archetype-age" value="35" min="14" max="70">
		</label>
	</div>
	<div class="comparison-row" id="archetype-row"></div>
</div>

<!-- Age progression -->
<div class="section">
	<h2>Same person, aging from 16 to 60</h2>
	<div class="controls">
		<label>
			Seed
			<input type="text" id="age-seed" value="career_player">
		</label>
		<label>
			Archetype
			<select id="age-archetype">
				<option value="player" selected>Player</option>
				<option value="rival">Rival</option>
				<option value="coach">Coach</option>
				<option value="recruiter">Recruiter</option>
				<option value="scout">Scout</option>
				<option value="generic">Generic</option>
			</select>
		</label>
	</div>
	<div class="comparison-row" id="age-row"></div>
</div>

<script type="module">
import { generatePortraitSVG, randomAvatarConfig } from './dist/avatar.js';

//------------------------------------------------------------
// Generate a strong random seed using crypto API
function generateRandomSeed() {
	const arr = new Uint32Array(2);
	crypto.getRandomValues(arr);
	return 'r_' + arr[0].toString(36) + arr[1].toString(36);
}

//------------------------------------------------------------
// Build a portrait card element
function makeCard(seed, archetype, age) {
	const config = randomAvatarConfig(seed, { archetype: archetype, age: age });
	const svg = generatePortraitSVG(config);
	const card = document.createElement('div');
	card.className = 'portrait-card';
	const info = archetype + ', age ' + age;
	card.innerHTML = svg + '<div class="label">' + seed + '<br>' + info + '</div>';
	return card;
}

//------------------------------------------------------------
// Fill main grid with fresh random seeds each time
function fillGrid() {
	const grid = document.getElementById('grid');
	grid.innerHTML = '';
	const archetype = document.getElementById('sel-archetype').value;
	const age = parseInt(document.getElementById('inp-age').value) || 22;
	for (let i = 0; i < 12; i++) {
		const seed = generateRandomSeed();
		const card = makeCard(seed, archetype, age);
		grid.appendChild(card);
	}
}

//------------------------------------------------------------
// Seed repeatability: same seed twice side by side
function testSeed() {
	const seed = document.getElementById('seed-input').value.trim();
	if (!seed) return;
	const row = document.getElementById('seed-row');
	row.innerHTML = '';
	const archetype = document.getElementById('sel-archetype').value;
	const age = parseInt(document.getElementById('inp-age').value) || 22;
	for (let i = 0; i < 2; i++) {
		const card = makeCard(seed, archetype, age);
		card.querySelector('.label').innerHTML = 'Render ' + (i + 1) + ': "' + seed + '"';
		row.appendChild(card);
	}
}

//------------------------------------------------------------
// Archetype comparison: same seed across all roles
function compareArchetypes() {
	const seed = document.getElementById('archetype-seed').value.trim() || 'test';
	const age = parseInt(document.getElementById('archetype-age').value) || 35;
	const row = document.getElementById('archetype-row');
	row.innerHTML = '';
	const archetypes = ['player', 'rival', 'coach', 'recruiter', 'scout', 'generic'];
	for (const arch of archetypes) {
		const card = makeCard(seed, arch, age);
		row.appendChild(card);
	}
}

//------------------------------------------------------------
// Age progression: same seed across age bands
function compareAges() {
	const seed = document.getElementById('age-seed').value.trim() || 'career';
	const archetype = document.getElementById('age-archetype').value;
	const row = document.getElementById('age-row');
	row.innerHTML = '';
	const ages = [16, 20, 25, 30, 40, 50, 60];
	for (const age of ages) {
		const card = makeCard(seed, archetype, age);
		row.appendChild(card);
	}
}

//------------------------------------------------------------
// Wire up main grid controls
document.getElementById('btn-randomize').addEventListener('click', fillGrid);
document.getElementById('sel-archetype').addEventListener('change', fillGrid);
document.getElementById('inp-age').addEventListener('change', fillGrid);

// Seed repeatability
document.getElementById('btn-seed').addEventListener('click', testSeed);
document.getElementById('seed-input').addEventListener('keydown', function(e) {
	if (e.key === 'Enter') testSeed();
});

// Archetype comparison: auto-refresh on any input change
document.getElementById('archetype-seed').addEventListener('input', compareArchetypes);
document.getElementById('archetype-age').addEventListener('input', compareArchetypes);

// Age progression: auto-refresh on any input change
document.getElementById('age-seed').addEventListener('input', compareAges);
document.getElementById('age-archetype').addEventListener('change', compareAges);

// Initial render
fillGrid();
compareArchetypes();
compareAges();
</script>

</body>
</html>
